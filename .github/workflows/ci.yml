name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: "sqlite+aiosqlite:///"
      ANTHROPIC_API_KEY: "sk-test-fake-key"
      GOOGLE_SERVICE_ACCOUNT_FILE: "test-sa.json"
      GOOGLE_DRIVE_FOLDER_ID: "test-folder-id"
      SECRET_KEY: "ci-test-key-12345"
      APP_ENV: "test"

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('api/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -x

      - name: Run evaluation suite
        run: python -m pytest tests/evaluation/ -v --tb=short

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes typecheck)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
